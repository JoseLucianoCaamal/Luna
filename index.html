<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LUNA // CORE SYSTEM</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <!-- Evita el error 404 del favicon en la consola -->
    <link rel="icon" type="image/jpeg" href="./akko.jpeg">
    <link rel="manifest" href="./manifest.json">
    
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .catch(err => console.log('Error SW:', err));
        }
    </script>
</head>
<body>
    <canvas id="canvas-core"></canvas>
    
    <div class="top-glass-bar">
        <span class="status-dot"></span>
        <span class="sys-text">LUNA_OS // ENLACE NEURAL</span>
        <span class="separator">|</span>
        <span class="sys-text" id="reloj">00:00:00</span>
        <span class="separator">|</span>
        <span class="sys-text">MÉRIDA, YUC.</span>
    </div>

    <div class="hud">
        <div class="pulse-container">
            <div class="pulse-ring"></div>
            <div class="core-center"></div>
        </div>
        
        <div class="info-panel">
            <div class="audio-visualizer" id="visualizador-voz">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>
            
            <h1 class="glitch-text">LUNA // EN ESPERA</h1>
            <div id="display" class="hologram-panel">> SISTEMA LUNAR EN LÍNEA. ESPERANDO COMANDOS.</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
